schemaVersion: repo-maturity.v1
repository: SocioProphet/functional-model-surfaces
plane: standards
status: active
canonicality: canonical
owners:
  - SocioProphet
maturity:
  level: M3
  targetLevel: M4
  evidence:
    - README.md defines purpose, doctrine, role, maturity gates, and integration path.
    - schemas/repo-maturity.schema.json defines estate maturity record shape.
    - schemas/functional-service.schema.json defines functional service manifest shape.
    - examples/repo.maturity.example.yaml provides a reusable maturity record example.
    - .github/workflows/validate.yml runs make validate on every PR and push to main.
    - fixtures/invalid/ contains 4 negative fixtures verified by tools/run_negative_fixtures.py.
    - docs/MATURITY_MODEL.md documents M0-M5 levels, evidence requirements, and Sociosphere ingestion.
    - docs/LAB_TEMPLATE.md describes the required lab repo skeleton and functional-service.v1 manifest.
validation:
  commands:
    - make validate
  ciRequired: true
  lastKnownStatus: passing
integrations:
  - repository: SocioProphet/prophet-platform
    relationship: runtime consumer for graduated functional surfaces
    required: true
  - repository: SocioProphet/model-governance-ledger
    relationship: promotion and evidence ledger consumer
    required: true
  - repository: SocioProphet/model-router
    relationship: routing policy consumer
    required: true
  - repository: SocioProphet/guardrail-fabric
    relationship: guardrail policy consumer
    required: true
  - repository: SocioProphet/agent-registry
    relationship: agent authority and tool grant consumer
    required: true
  - repository: SourceOS-Linux/sourceos-model-carry
    relationship: SourceOS carry-only reference consumer
    required: true
  - repository: SocioProphet/sociosphere
    relationship: workspace governance and maturity ingestion
    required: true
nextActions:
  - Add versioned release artifacts with checksums for M4 readiness.
  - Add SBOM or provenance attestation for release artifacts.
  - Register this repo in workspace-inventory/sociosphere scorecard.
  - Mirror lab template into SociOS modality lab repositories.
